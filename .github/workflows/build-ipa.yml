# PORTED FROM: (new) — BionicSX2 iOS Port
# AUDIT REFERENCE: Sections 10.3, 13.6
# STATUS: NEW — GitHub Actions IPA build pipeline for Apple Silicon

name: Build BionicSX2 IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # AUDIT REFERENCE: Section 13.6 — Apple Silicon M-series runner
    # Required for ARM64 iOS toolchain support
    runs-on: macos-14


    steps:
      # AUDIT REFERENCE: Section 13.6 — Checkout with submodules
      # PCSX2 core is expected to be a submodule in src/
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # AUDIT REFERENCE: Section 13.6 — Install build dependencies
      # NOTE: No Homebrew library dylibs — iOS SDK frameworks + 3rdparty sources only
      - name: Install dependencies
        run: |
          brew install \
            cmake ninja

      # AUDIT REFERENCE: Section 10.2 — Resolve iOS SDK path via xcrun
      # Must be done before cmake — toolchain files run before compiler init
      - name: Get iOS SDK path
        run: echo "IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV

      # AUDIT REFERENCE: Section 10.2 — CMake configure with iOS toolchain
      # All dependencies use iOS SDK frameworks or 3rdparty source builds
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_OSX_SYSROOT=${{ env.IOS_SDK }} \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_C_COMPILER=$(xcrun --find clang) \
            -DCMAKE_CXX_COMPILER=$(xcrun --find clang++) \
            -DCMAKE_C_COMPILER_TARGET=arm64-apple-ios15.0 \
            -DCMAKE_CXX_COMPILER_TARGET=arm64-apple-ios15.0

      # AUDIT REFERENCE: Section 10.3 — Build for iOS arm64
      - name: Build
        run: |
          cmake --build build --config Release -- -j$(sysctl -n hw.logicalcpu)

      # AUDIT REFERENCE: Section 10.3 — CRITICAL DIAGNOSTIC
      - name: CRITICAL DIAGNOSTIC
        run: |
          echo "======= FULL BUILD DIRECTORY ======="
          find build -type f | sort

          echo "======= ALL EXECUTABLES ======="
          find build -type f | xargs file 2>/dev/null | grep -i "mach-o\|arm64\|executable"

          echo "======= STATIC LIBS ======="
          find build -name "*.a" | xargs ls -lh 2>/dev/null

          echo "======= .app BUNDLE ======="
          find build -name "*.app" -type d | xargs ls -lh 2>/dev/null

          echo "======= CMake executable target location ======="
          cat build/CMakeFiles/BionicSX2.dir/build.make 2>/dev/null | grep -i "output\|target" | head -10

          echo "======= bionicsx2_core.a size ======="
          find build -name "libbionicsx2_core.a" | xargs ls -lh 2>/dev/null

          echo "======= BionicSX2 executable size ======="
          find build -name "BionicSX2" ! -name "*.cpp" ! -name "*.h" | xargs ls -lh 2>/dev/null

          echo "======= TOTAL BUILD SIZE ======="
          du -sh build/

      # AUDIT REFERENCE: Section 10.3 — Package IPA from CMake binary
      - name: Package IPA
        run: |
          # Check for .app bundle first (MACOSX_BUNDLE output)
          APP_BUNDLE=$(find build -name "BionicSX2.app" -type d | head -1)

          if [ -n "$APP_BUNDLE" ]; then
            echo "Found .app bundle: $APP_BUNDLE"
            ls -lh "$APP_BUNDLE/"
            # Use the whole bundle
            mkdir -p Payload
            cp -r "$APP_BUNDLE" Payload/BionicSX2.app
          else
            echo "No .app bundle — looking for raw binary"
            BINARY=$(find build -type f | xargs file 2>/dev/null \
              | grep -i "mach-o.*arm64\|arm64.*executable" \
              | cut -d: -f1 | head -1)

            if [ -z "$BINARY" ]; then
              echo "ERROR: No ARM64 binary found"
              find build -type f | sort
              exit 1
            fi

            echo "Found binary: $BINARY"
            ls -lh "$BINARY"
            mkdir -p Payload/BionicSX2.app
            cp "$BINARY" Payload/BionicSX2.app/BionicSX2
            cp ios/Info.plist Payload/BionicSX2.app/Info.plist
          fi

          # Sign ad-hoc
          codesign --force --deep --sign - Payload/BionicSX2.app || true

          # Package
          mkdir -p output
          zip -r output/BionicSX2.ipa Payload/
          ls -lh output/BionicSX2.ipa
          unzip -l output/BionicSX2.ipa

      # AUDIT REFERENCE: Section 13.6 — Upload IPA as build artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BionicSX2-IPA
          path: output/BionicSX2.ipa
          retention-days: 30
          if-no-files-found: error
