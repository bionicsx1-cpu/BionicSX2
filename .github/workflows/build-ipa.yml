# PORTED FROM: (new) — BionicSX2 iOS Port
# AUDIT REFERENCE: Sections 10.3, 13.6
# STATUS: NEW — GitHub Actions IPA build pipeline for Apple Silicon

name: Build BionicSX2 IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # AUDIT REFERENCE: Section 13.6 — Apple Silicon M-series runner
    # Required for ARM64 iOS toolchain support
    runs-on: macos-14


    steps:
      # AUDIT REFERENCE: Section 13.6 — Checkout with submodules
      # PCSX2 core is expected to be a submodule in src/
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # AUDIT REFERENCE: Section 13.6 — Install build dependencies
      - name: Install dependencies
        run: |
          brew install \
            cmake ninja \
            libpng \
            ffmpeg \
            lz4 \
            zstd \
            curl \
            webp \
            freetype \
            sdl3 \
            shaderc \
            rapidyaml

      # AUDIT REFERENCE: Section 10.2 — Resolve iOS SDK path via xcrun
      # Must be done before cmake — toolchain files run before compiler init
      - name: Get iOS SDK path
        run: echo "IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV

      # AUDIT REFERENCE: Section 10.2 — Set library paths for system deps
      - name: Set library paths
        run: |
          echo "PNG_DIR=$(brew --prefix libpng)" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix)" >> $GITHUB_ENV

      # AUDIT REFERENCE: Section 10.2 — CMake configure with iOS toolchain
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_OSX_SYSROOT=${{ env.IOS_SDK }} \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_C_COMPILER=$(xcrun --find clang) \
            -DCMAKE_CXX_COMPILER=$(xcrun --find clang++) \
            -DCMAKE_C_COMPILER_TARGET=arm64-apple-ios15.0 \
            -DCMAKE_CXX_COMPILER_TARGET=arm64-apple-ios15.0 \
            -DPNG_PNG_INCLUDE_DIR=${{ env.PNG_DIR }}/include \
            -DPNG_LIBRARY=${{ env.PNG_DIR }}/lib/libpng.dylib \
            -DAVCODEC_INCLUDE_DIR=$(brew --prefix ffmpeg)/include \
            -DAVFORMAT_INCLUDE_DIR=$(brew --prefix ffmpeg)/include \
            -DAVUTIL_INCLUDE_DIR=$(brew --prefix ffmpeg)/include \
            -DSWSCALE_INCLUDE_DIR=$(brew --prefix ffmpeg)/include \
            -DLZ4_INCLUDE_DIR=$(brew --prefix lz4)/include \
            -DLZ4_LIBRARY=$(brew --prefix lz4)/lib/liblz4.dylib \
            -DZSTD_INCLUDE_DIR=$(brew --prefix zstd)/include \
            -DZSTD_LIBRARY=$(brew --prefix zstd)/lib/libzstd.dylib \
            -DCURL_INCLUDE_DIR=$(brew --prefix curl)/include \
            -DCURL_LIBRARY=$(brew --prefix curl)/lib/libcurl.dylib \
            -DWEBP_INCLUDE_DIR=$(brew --prefix webp)/include \
            -DFREETYPE_INCLUDE_DIRS=$(brew --prefix freetype)/include/freetype2 \
            -DFREETYPE_LIBRARY=$(brew --prefix freetype)/lib/libfreetype.dylib \
            -DSDL3_DIR=$(brew --prefix sdl3)/lib/cmake/SDL3 \
            -DCMAKE_PREFIX_PATH=${{ env.CMAKE_PREFIX_PATH }}

      # AUDIT REFERENCE: Section 10.3 — Build for iOS arm64
      - name: Build
        run: |
          cmake --build build --config Release -- -j$(sysctl -n hw.logicalcpu)

      # AUDIT REFERENCE: Section 10.3 — Export unsigned IPA
      # CODE_SIGN_IDENTITY="" for unsigned development builds
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ github.workspace }}/build/BionicSX2.xcarchive \
            -exportPath ${{ github.workspace }}/build/BionicSX2.ipa \
            -exportOptionsPlist ${{ github.workspace }}/exportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            CODE_SIGNING_ALLOWED=NO || echo "Signing will fail without Apple Developer account"

      # AUDIT REFERENCE: Section 13.6 — Upload IPA as build artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BionicSX2-iOS-IPA
          path: |
            build/BionicSX2.ipa
            build/BionicSX2.app
          retention-days: 30
          if-no-files-found: warn
